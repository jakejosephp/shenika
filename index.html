<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Patrick Hand', cursive;
    overflow:hidden;
    background: radial-gradient(circle at 50% 50%, #ffcad4, #ffeef5, #ffd6e7);
    animation: bgShift 15s ease-in-out infinite alternate;
}

@keyframes bgShift {
    0%{background: radial-gradient(circle at 50% 50%, #ffcad4, #ffeef5, #ffd6e7);}
    50%{background: radial-gradient(circle at 70% 30%, #ffd6e7, #ffefff, #ffcad4);}
    100%{background: radial-gradient(circle at 30% 70%, #ffeef5, #ffcad4, #ffd6e7);}
}

.container {
    text-align:center;
    max-width:600px;
    z-index:10;
    position:relative;
}

#text {
    font-size:28px;
    color:#333;
    min-height:150px;
}

.heart {
    font-size:80px;
    opacity:0;
    transition:opacity 1.5s;
    margin-top:20px;
}

.show {
    opacity:1;
}

button {
    font-family: 'Patrick Hand', cursive;
    padding:10px 20px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ffb6c1;
    color:#fff;
    cursor:pointer;
    margin-top:20px;
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.1);
}

/* Twinkling stars */
.star {
    position:absolute;
    background:white;
    border-radius:50%;
    width:2px;
    height:2px;
    opacity:0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from {opacity:0.2;}
    to {opacity:1;}
}
</style>
</head>
<body>
<div class="container">
    <div id="text"></div>
    <div id="heart" class="heart"></div>
    <button id="replay" style="display:none;">Replay ❤️</button>
</div>

<audio id="typeAudio" src="button.mp3"></audio>

<script>
// ================= Message & Typewriter ==================
const message = [
"Hi princess",
"I made you this page",
"To tell you that",
"You are incredible, sweet and beautiful",
"Thanks be to Jesus Christ that you came into my life",
"I cannot wait to see",
"what the future has in store for us"
];

let line = 0;
let char = 0;
const speed = 40;

function typeWriter(){
    const audio = document.getElementById('typeAudio');
    if(line < message.length){
        if(char < message[line].length){
            document.getElementById("text").innerHTML += message[line].charAt(char);
            audio.currentTime = 0;
            audio.play();
            char++;
            setTimeout(typeWriter, speed);
        } else {
            document.getElementById("text").innerHTML += "<br><br>";
            char = 0;
            line++;
            setTimeout(typeWriter, 600);
        }
    } else {
        showHeart();
    }
}

// ================= Heart & Floating Hearts ==================
function showHeart(){
    const heart = document.getElementById('heart');
    heart.classList.add('show');
    createFloatingHearts();
    document.getElementById('replay').style.display = 'inline-block';
}

function createFloatingHearts(){
    for(let i=0;i<15;i++){
        let h = document.createElement('div');
        h.innerText = '❤️';
        h.style.position='absolute';
        h.style.left = Math.random()*90+'%';
        h.style.top = '100%';
        h.style.fontSize = (20+Math.random()*40)+'px';
        h.style.opacity = Math.random();
        document.body.appendChild(h);
        h.animate([
            {transform:'translateY(0) scale(1)', opacity: h.style.opacity},
            {transform:'translateY(-120vh) scale(1.2)', opacity:0}
        ],{duration:4000+Math.random()*2000, iterations:1});
        setTimeout(()=>h.remove(),6000);
    }
}

// ================= Twinkling Stars Background ==================
for(let i=0;i<50;i++){
    let star = document.createElement('div');
    star.classList.add('star');
    star.style.top = Math.random()*100 + '%';
    star.style.left = Math.random()*100 + '%';
    star.style.width = (1+Math.random()*2)+'px';
    star.style.height = star.style.width;
    star.style.animationDuration = (1+Math.random()*2)+'s';
    document.body.appendChild(star);
}

// ================= Replay Button ==================
document.getElementById('replay').addEventListener('click', ()=>{
    document.getElementById('text').innerHTML = '';
    document.getElementById('heart').classList.remove('show');
    line=0; char=0;
    typeWriter();
});

typeWriter();
</script>
</body>
</html>
